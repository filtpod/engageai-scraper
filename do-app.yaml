#cloud-config
# Droplet user data (not App Platform). See README: Droplet cloud-init (do-app.yaml).

package_update: true
package_upgrade: true

packages:
  - docker.io
  - git

write_files:
  - path: /etc/cron.d/engageai-scraper
    permissions: "0644"
    content: |
      SHELL=/bin/bash
      PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      CRON_TZ=UTC
      # Premium-only run 6 days/week (Mon-Sat) at 00:00 UTC.
      0 0 * * 1-6 root docker run --rm --env-file /opt/engageai-scraper/.env -e SCRAPE_GROUP_FILTER=premium_only engageai-scraper >> /var/log/engageai-scraper.log 2>&1
      # Full run on the 7th day (Sunday) at 00:00 UTC.
      0 0 * * 0 root docker run --rm --env-file /opt/engageai-scraper/.env -e SCRAPE_GROUP_FILTER=all engageai-scraper >> /var/log/engageai-scraper.log 2>&1

runcmd:
  - [systemctl, enable, --now, docker]
  - |
    set -euo pipefail
    REPO="https://github.com/TeamEAI/engageai-scraper.git"
    mkdir -p /opt/engageai-scraper
    if [ ! -d /opt/engageai-scraper/.git ]; then
      git clone --depth 1 --branch main "$REPO" /opt/engageai-scraper
    fi
    docker build -t engageai-scraper /opt/engageai-scraper
    if [ ! -f /opt/engageai-scraper/.env ]; then
      umask 077
      printf '%s\n' \
        '# Paste secrets here (see README). Required: DB_*, DEEPSEEK_API_KEY, etc.' \
        > /opt/engageai-scraper/.env
      chmod 600 /opt/engageai-scraper/.env
    fi
    touch /var/log/engageai-scraper.log
    chmod 644 /var/log/engageai-scraper.log
